<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="FlowBoard — real-time collaborative infinite-canvas whiteboard."
    />
    <title>FlowBoard — Collaborative Whiteboard</title>
    <!-- Yanıp-sönməni (flash) önləmək üçün tema səhifə boyanmadan əvvəl tətbiq olunur -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('flowboard-theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.classList.toggle('dark', theme === 'dark');
        } catch (e) {
          /* localStorage əlçatan deyilsə, defolt açıq tema */
        }
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
